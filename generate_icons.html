<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body style="background:#111;color:#fff;font-family:sans-serif;padding:20px;">
<h2>Gemini UI Enhancer — Icon Generator</h2>
<p>Right-click each icon and "Save Image As" to the <code>icons/</code> folder.</p>
<div id="icons" style="display:flex;gap:30px;align-items:end;margin-top:20px;"></div>
<script>
function makeIcon(size) {
  const c = document.createElement('canvas');
  c.width = size; c.height = size;
  const ctx = c.getContext('2d');
  
  // Rounded rect background
  const r = size * 0.15;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = '#0a0e1a';
  ctx.fill();

  // Gradient sparkle
  const cx = size/2, cy = size/2;
  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, '#60a5fa');
  grad.addColorStop(0.5, '#a78bfa');
  grad.addColorStop(1, '#f472b6');
  ctx.fillStyle = grad;

  // 4-point star
  const outer = size * 0.38;
  const inner = size * 0.12;
  ctx.beginPath();
  for (let i = 0; i < 8; i++) {
    const rad = i % 2 === 0 ? outer : inner;
    const angle = (Math.PI * i) / 4 - Math.PI / 2;
    const x = cx + Math.cos(angle) * rad;
    const y = cy + Math.sin(angle) * rad;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();

  // Glow for larger icons
  if (size >= 48) {
    ctx.shadowColor = '#a78bfa';
    ctx.shadowBlur = size * 0.08;
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  return c;
}

const container = document.getElementById('icons');
[16, 48, 128].forEach(size => {
  const div = document.createElement('div');
  div.style.textAlign = 'center';
  const canvas = makeIcon(size);
  const img = document.createElement('img');
  img.src = canvas.toDataURL('image/png');
  img.style.border = '1px solid #333';
  img.style.borderRadius = '4px';
  img.title = 'Right-click → Save Image As → icon' + size + '.png';
  div.appendChild(img);
  const label = document.createElement('p');
  label.textContent = 'icon' + size + '.png';
  label.style.fontSize = '12px';
  label.style.marginTop = '8px';
  label.style.color = '#888';
  div.appendChild(label);
  container.appendChild(div);
});

// Also try auto-download
function downloadIcon(size) {
  const canvas = makeIcon(size);
  const link = document.createElement('a');
  link.download = 'icon' + size + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

const btn = document.createElement('button');
btn.textContent = 'Download All Icons';
btn.style.cssText = 'margin-top:20px;padding:10px 20px;background:#6366f1;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;';
btn.onclick = () => { [16,48,128].forEach(s => setTimeout(() => downloadIcon(s), s * 10)); };
document.body.appendChild(btn);
</script>
</body>
</html>
